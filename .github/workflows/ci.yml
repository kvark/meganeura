name: CI
on:
  push:
    branches: ["main", "claude/*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux (lavapipe)
            os: ubuntu-latest
            skip_backprop: "1"
          - name: macOS (Metal)
            os: macos-latest
            skip_backprop: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install lavapipe and Vulkan
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools libvulkan-dev
          vulkaninfo --summary 2>&1 | head -30

      - uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Unit tests
        run: cargo test --lib

      - name: Gradient correctness (gradcheck)
        # Catches the bug class where backward ops drop grad_output
        # (works only when op is final loss, fails mid-graph). Every
        # backward must chain grad_output; gradcheck verifies analytical
        # vs finite-difference gradients in mid-graph contexts. See
        # tests/gradcheck.rs and the contract comment at the top of
        # autodiff.rs's match block.
        run: cargo test --test gradcheck

      - name: GPU smoke test
        run: cargo test --test gpu_smoke
        env:
          # MHA backward shaders produce numerically unstable gradients on
          # lavapipe and on CI Metal runners (grad_k divergence on M-series).
          MEGANEURA_SKIP_BACKPROP: ${{ matrix.skip_backprop }}

      - name: Cache + inference roundtrip test
        run: cargo test --test cache_inference

      - name: Vision ops smoke test
        run: cargo test --test vision_ops_smoke -- --skip vision_encoder_one_layer

      - name: Latency benchmark
        if: runner.os == 'Linux'
        run: |
          mkdir -p bench/results
          cargo run --release --example bench_ci_latency > bench/results/ci_latency.json 2>/dev/null
          cat bench/results/ci_latency.json
          python3 bench/check_latency.py bench/results/ci_latency.json
